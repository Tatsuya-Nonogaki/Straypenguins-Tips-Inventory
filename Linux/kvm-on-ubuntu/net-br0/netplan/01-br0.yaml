network:
  version: 2
  renderer: networkd
  ethernets:
    enp3s0:
      dhcp4: no
      dhcp6: no
  bridges:
    br0:
      interfaces: [enp3s0]
      addresses:
        - 192.168.1.5/24
      routes:
        - to: default
          via: 192.168.1.252
      nameservers:
        addresses:
          - 1.1.1.1
          - 8.8.8.8
